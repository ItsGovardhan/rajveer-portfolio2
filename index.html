<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<style>
  :root {
    --primary: #00ff78;
    --accent: #ff60b0;
    --bg-dark: #030305;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    overflow: hidden;
    color: white;
    background-color: var(--bg-dark);
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Background video styling */
  #bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: brightness(0.2) contrast(1.4) saturate(0.8);
  }

  .bg-fallback {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(20,4,15,1) 0%, rgba(0,0,0,1) 100%);
    z-index: -2;
  }

  /* Entry screen styling */
  #enter-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
  }

  #enter-screen h1 {
    font-size: 1.5rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--primary);
    text-shadow: 0 0 10px rgba(0, 255, 120, 0.5);
    font-family: monospace;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.98); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Ultra Premium Card Outer Frame Container */
  .card-wrapper {
    position: relative;
    padding: 4px;
    border-radius: 24px;
    background: linear-gradient(135deg, #444 0%, #111 40%, #441634 70%, var(--accent) 100%);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(230, 30, 130, 0.15);
    transition: transform 0.3s ease;
    max-width: 90vw;
  }

  /* Internal Card Body */
  .card {
    width: 360px;
    height: 520px;
    padding: 40px 30px;
    text-align: center;
    background: linear-gradient(180deg, #0f030b 0%, #050106 100%);
    border-radius: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    border: 1px solid rgba(255, 255, 255, 0.03);
  }

  /* Profile Picture & Aura Container */
  .pfp-container {
    position: relative;
    width: 140px;
    height: 140px;
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Futuristic Cyber Ring Frame surrounding Avatar */
  .cyber-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px dashed var(--primary);
    box-shadow: 0 0 15px rgba(0, 255, 120, 0.4);
    animation: rotateRing 20s linear infinite;
  }

  .cyber-ring::before {
    content: '';
    position: absolute;
    top: -6px; left: -6px; right: -6px; bottom: -6px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0.3;
    animation: rotateRing 10s linear infinite reverse;
  }

  @keyframes rotateRing {
    100% { transform: rotate(360deg); }
  }

  .pfp-holder {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #16161a;
    box-shadow: 0 0 25px rgba(0,0,0,0.9);
    z-index: 2;
  }

  .pfp {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Content Layout */
  .content-area {
    width: 100%;
    margin-top: 15px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Advanced Glitch Name Effect */
  .name {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    position: relative;
    text-transform: uppercase;
    display: inline-block;
    margin: 0 auto 10px auto;
    text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
    animation: glitch 500ms infinite;
  }

  .name span {
    position: absolute;
    top: 0; left: 0;
  }

  @keyframes glitch {
    0% {
      text-shadow: 1px 2px 0 rgba(255,0,0,.5), -2px -1px 0 rgba(0,255,0,.5), 2px 1px 0 rgba(0,0,255,.5);
    }
    15% {
      text-shadow: -2px -2px 0 rgba(255,0,0,.5), 2px 2px 0 rgba(0,255,0,.5), -1px 2px 0 rgba(0,0,255,.5);
    }
    49% {
      text-shadow: 1px 2px 0 rgba(255,0,0,.5), -2px -1px 0 rgba(0,255,0,.5), 2px 1px 0 rgba(0,0,255,.5);
    }
    50% {
      text-shadow: 3px -1px 0 rgba(255,0,0,.5), 1px -2px 0 rgba(0,255,0,.5), +2px 3px 0 rgba(0,0,255,.5);
    }
    99% {
      text-shadow: 3px -1px 0 rgba(255,0,0,.5), 1px -2px 0 rgba(0,255,0,.5), +2px 3px 0 rgba(0,0,255,.5);
    }
    100% {
      text-shadow: -1px 1px 0 rgba(255,0,0,.5), -1px -2px 0 rgba(0,255,0,.5), -2px -1px 0 rgba(0,0,255,.5);
    }
  }

  /* Tagline Styling */
  .sub-caption {
    font-size: 15px;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    letter-spacing: 2px;
    color: var(--primary);
    margin-bottom: 25px;
    min-height: 18px;
    text-shadow: 0 0 8px rgba(0, 255, 120, 0.4);
  }

  /* Neon Minimalist Social Layout Dock */
  .social-dock {
    background: rgba(4, 6, 10, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 28px;
    display: inline-flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    transition: border 0.3s;
  }

  .social-dock:hover {
    border-color: rgba(0, 255, 120, 0.3);
  }

  .social-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .social-icon svg {
    fill: #ffffff;
    opacity: 0.7;
    width: 100%;
    height: 100%;
    transition: fill 0.2s, opacity 0.2s, filter 0.2s;
  }

  .social-icon:hover {
    transform: scale(1.25) translateY(-2px);
  }

  .social-icon:hover svg {
    opacity: 1;
    fill: var(--accent);
    filter: drop-shadow(0 0 8px var(--accent));
  }

  /* Modern Neon Digital Bottom View Counter */
  .counter-badge {
    background: #090a0d;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 6px 18px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    font-size: 13px;
  }

  .counter-badge .count-num {
    font-family: 'Courier New', monospace;
    color: var(--primary);
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0,255,120,0.6);
  }

  .counter-badge svg {
    fill: #666973;
    width: 14px;
    height: 14px;
  }

  /* Responsive Scaling tweaks for smaller desktop windows or mobile ports */
  @media (max-height: 600px) {
    .card-wrapper { transform: scale(0.85); }
  }
</style>
</head>
<body>

<div class="bg-fallback"></div>

<div id="enter-screen" onclick="enterSite()">
  <h1>[ Click to Enter ]</h1>
</div>

<video loop id="bg-video" muted playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="card-wrapper">

    </div>

    <div class="content-area">
      <div class="name" id="glitch-name">itsme</div>
      <div class="sub-caption" id="typing-text"></div>

      </div>
    </div>

    <div class="counter-badge">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>

  </div>
</div>

<script>
// Smoothly triggers audio-visual layers upon interactive permission
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
    startTypingEffect();
  }, 600);

  video.muted = false;
  video.volume = 0.3;
  video.play().catch(err => {
    console.log("Audio presentation handled safely.", err);
  });
}

// Matrix/Cyberpunk Style automated text decoder effect for the tagline
function startTypingEffect() {
  const targetText = "chill gng";
  const container = document.getElementById("typing-text");
  const chars = "XØ█▓▒░▄█▀🤖⚡✨⚔";
  let iterations = 0;
  
  const interval = setInterval(() => {
    container.innerText = targetText
      .split("")
      .map((letter, index) => {
        if(index < iterations) {
          return targetText[index];
        }
        return chars[Math.floor(Math.random() * chars.length)];
      })
      .join("");
    
    if(iterations >= targetText.length) {
      clearInterval(interval);
      container.innerText = targetText; // Ensure exact final text match
    }
    
    iterations += 1 / 3;
  }, 40);
}
</script>

</html>
