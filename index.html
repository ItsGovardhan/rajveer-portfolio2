<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<!-- Importing a pixel font to match the guns.lol style in the screenshot -->
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    color: white;
    background-color: #050103;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Background Video & Fallback */
  #bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -2;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: brightness(0.25) contrast(1.2);
  }

  .bg-fallback {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #3a071c 0%, #080104 100%);
    z-index: -3;
  }

  /* Entry Splash Screen */
  #enter-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #080104;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.5s ease, visibility 0.5s;
  }

  #enter-screen h1 {
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0.6;
    font-family: monospace;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* Main Card - Exact proportions and colors from 1000043419.jpg */
  .card {
    width: 350px;
    max-width: 90vw;
    background: linear-gradient(180deg, #460c27 0%, #19020e 100%);
    border-radius: 28px;
    padding: 40px 30px 30px 30px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.9);
    border: 1px solid rgba(255, 255, 255, 0.03);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Profile Picture with clean translucent frame */
  .pfp-container {
    margin-bottom: 20px;
    border-radius: 50%;
    border: 5px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    display: inline-block;
  }

  .pfp {
    width: 125px;
    height: 125px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  /* Muted Retro Glitch Name */
  .name {
    font-family: 'VT323', monospace;
    font-size: 52px;
    color: #ffffff;
    letter-spacing: 1px;
    margin-bottom: 12px;
    line-height: 1;
    text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
  }

  /* Clean Subtitle */
  .sub-caption {
    font-size: 17px;
    color: #ffffff;
    opacity: 0.9;
    margin-bottom: 30px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* Social Icons Row with Hazy Soft Glow */
  .social-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
  }

  .social-icon {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform 0.2s ease;
  }

  .social-icon svg {
    fill: #ffffff;
    opacity: 0.75;
    width: 100%;
    height: 100%;
    /* Creates that exact soft, blurry background glow behind the icons */
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.65));
    transition: opacity 0.2s ease, filter 0.2s ease;
  }

  .social-icon:hover {
    transform: scale(1.08);
  }

  .social-icon:hover svg {
    opacity: 1;
    filter: drop-shadow(0 0 16px rgba(255, 180, 210, 0.9));
  }

  /* View Counter */
  .view-counter {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    position: absolute;
    bottom: 22px;
    left: 25px;
  }

  .view-counter svg {
    fill: rgba(255, 255, 255, 0.6);
    width: 16px;
    height: 16px;
  }

  .view-counter span {
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="bg-fallback"></div>

<div id="enter-screen" onclick="enterSite()">
  <h1>[ Click to Enter ]</h1>
</div>

<video loop id="bg-video" muted playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="card">
  
  <div class="pfp-container">
    <img class="pfp" src="pfp.png" alt="Profile Picture">  
  </div>

  <div class="name">itsme</div>
  <div class="sub-caption">chill gng</div>

    </a>
  </div>

  <div class="view-counter">
    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    <span>3</span>
  </div>

</div>

<script>
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
  }, 500);

  video.muted = false;
  video.volume = 0.3;
  video.play().catch(err => {
    console.log("Media element browser auto-play initialized.", err);
  });
}
</script>

</body>
</html>
