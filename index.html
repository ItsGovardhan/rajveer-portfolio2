<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    color: white;
    background-color: #050103;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
  }

  /* Fullscreen Background Video & Overlay */
  #bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -2;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: brightness(0.4) contrast(1.1);
  }

  .bg-darkener {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    z-index: -1;
  }

  /* Canvas layer for custom snowflake particles */
  #particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Entry Splash Screen */
  #enter-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
  }

  #enter-screen h1 {
    font-size: 24px;
    letter-spacing: 4px;
    text-transform: lowercase;
    color: #ffffff;
    font-family: monospace;
    animation: blink 1.8s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* Ultra Transparent Main Card Layout Container */
  .card {
    width: 360px;
    max-width: 90vw;
    background: rgba(255, 255, 255, 0.03); /* Very transparent backing */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 35px 25px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  /* Discord Ring Inspired Frame */
  .pfp-container {
    margin-bottom: 15px;
    border-radius: 50%;
    border: 4px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    display: inline-block;
  }

  .pfp {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  /* Display Name */
  .name {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 32px;
    color: #ffffff;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
  }

  /* Status Badge Element */
  .badge {
    background: rgba(255, 255, 255, 0.1);
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 15px;
    border: 1px solid rgba(255, 255, 255, 0.15);
  }

  /* Dynamic Bio Sub-captions */
  .sub-caption {
    font-size: 15px;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 6px;
    font-weight: 400;
  }

  .location {
    font-size: 13px;
    color: #00ffcc;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Social Links Grid */
  .social-row {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-bottom: 25px;
    width: 100%;
  }

  .social-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .social-icon svg {
    fill: #ffffff;
    opacity: 0.7;
    width: 100%;
    height: 100%;
    transition: opacity 0.2s ease, filter 0.2s ease;
  }

  .social-icon:hover {
    transform: scale(1.2);
  }

  .social-icon:hover svg {
    opacity: 1;
    filter: drop-shadow(0 0 8px #ffffff);
  }

  /* View Counter System Design */
  .view-counter {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
  }

  .view-counter svg {
    fill: rgba(255, 255, 255, 0.5);
    width: 16px;
    height: 16px;
  }
</style>

<script>
// Automatically Updated View Counter Execution Engine
function handleViews() {
  let views = localStorage.getItem('profile_view_count');
  if (!views) {
    views = Math.floor(Math.random() * (400 - 150 + 1)) + 150; 
  } else {
    views = parseInt(views) + 1;
  }
  localStorage.setItem('profile_view_count', views);
  document.getElementById('counts-display').innerText = views;
}
handleViews();

// Canvas particle overlay initialization
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let particles = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height - canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speedY = Math.random() * 1.5 + 0.5;
    this.speedX = Math.random() * 1 - 0.5;
    this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    if (this.y > canvas.height) {
      this.y = 0 - 10;
      this.x = Math.random() * canvas.width;
    }
  }
  draw() {
    ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`; // Custom cyan particle trace color
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 65; i++) {
    particles.push(new Particle());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}

// Global Site Access Action Function 
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
    initParticles();
    animateParticles();
  }, 600);

  // Audio system activator
  video.muted = false;
  video.volume = 0.4;
  video.play().catch(err => {
    console.log("Autoplay caught/prevented by web systems container.", err);
  });
}
</script>
