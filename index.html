<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
  color: white;
  background-color: #030305;
}

/* Background video styling */
#bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.25) contrast(1.3);
}

.bg-fallback {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(30,3,15,1) 0%, rgba(0,0,0,1) 100%);
  z-index: -2;
}

/* Entry screen styling */
#enter-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.8s ease, visibility 0.8s;
}

#enter-screen h1 {
  font-size: 24px;
  letter-spacing: 4px;
  text-transform: uppercase;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

/* Ultra Premium Card Outer Frame Container */
.card-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 6px;
  border-radius: 40px;
  background: linear-gradient(180deg, #5b5b66 0%, #1c1c24 30%, #441634 70%, #902d6d 100%);
  box-shadow: 0 0 40px rgba(230, 30, 130, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.1);
}

/* Internal Card Body */
.card {
  width: 370px;
  height: 560px;
  padding: 30px 25px;
  text-align: center;
  background: radial-gradient(circle at top, #2e081f 0%, #0d040a 60%, #15020f 100%);
  border-radius: 35px;
  position: relative;
  overflow: visible;
  border: 2px solid #141419;
}

/* Giant Custom Zoro Sword Magical Decoration Ring */
.decor-wrap {
  position: absolute;
  top: -65px;
  left: 50%;
  transform: translateX(-50%);
  width: 250px;
  height: 250px;
  z-index: 5;
}

.zoro-ring {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 12px rgba(0, 255, 120, 0.85));
  animation: spinSlow 25s linear infinite;
}

@keyframes spinSlow {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* PFP Inside the Center of Ring */
.pfp-holder {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 135px;
  height: 135px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid #1b1c22;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);
  z-index: 4;
}

.pfp {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Text & Content Elements spacing down due to high overlapping PFP */
.content-area {
  margin-top: 155px;
}

/* Username Style */
.name {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: 1px;
  margin-bottom: 8px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* New Tagline */
.sub-caption {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.5px;
  margin-bottom: 45px;
  color: rgba(255, 255, 255, 0.7);
}

/* Custom Social Layout Dock Wrapper */
.social-dock {
  background: linear-gradient(180deg, rgba(0, 255, 130, 0.15) 0%, rgba(5, 15, 10, 0.6) 100%);
  border: 2px solid #00ff78;
  box-shadow: 0 0 15px rgba(0, 255, 120, 0.3);
  border-radius: 20px;
  padding: 12px 25px;
  display: inline-flex;
  gap: 25px;
  align-items: center;
  justify-content: center;
  margin-bottom: 30px;
}

.social-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease, filter 0.2s;
}

.social-icon svg {
  fill: #ff60b0;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 5px rgba(255, 96, 176, 0.6));
}

.social-icon:hover {
  transform: scale(1.2);
}

/* Bottom Metallic Shield/Footer bar pieces */
.bottom-decor {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 60px;
  pointer-events: none;
}

/* Modern Neon Digital Bottom View Counter */
.counter-badge {
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
  background: #111216;
  border: 2px solid #4a1534;
  border-bottom: none;
  padding: 6px 20px;
  border-radius: 12px 12px 0 0;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
  z-index: 6;
}

.counter-badge .count-num {
  font-family: 'Courier New', monospace;
  color: #00ff78;
  font-weight: bold;
  font-size: 16px;
  text-shadow: 0 0 6px rgba(0,255,120,0.8);
}

.counter-badge svg {
  fill: #858894;
  width: 16px;
  height: 16px;
}
</style>
</head>

<script>
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
  }, 800);

  video.muted = false;
  video.volume = 0.4;
  video.play().catch(err => {
    console.log("Video playback handled safely.", err);
  });
}
</script>

</body>
</html>
