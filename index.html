<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
  color: white;
  background-color: #000;
}

/* Background video styling */
#bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.4);
}

/* Guns.lol style entry screen */
#enter-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.8s ease, visibility 0.8s;
}

#enter-screen h1 {
  font-size: 24px;
  letter-spacing: 4px;
  text-transform: uppercase;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

/* Main profile container */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 30px;
  width: 330px;
  text-align: center;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.5);
  border-radius: 15px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
}

/* Floating profile pic */
.pfp {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin-bottom: 15px;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

/* Username text */
.name {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 5px;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

/* Bio text */
.bio {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 20px;
}

/* Link buttons */
.btn {
  display: block;
  margin: 8px 0;
  padding: 10px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  text-decoration: none;
  color: white;
  transition: 0.3s ease;
  font-size: 14px;
  font-weight: 500;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: scale(1.02);
}
</style>
</head>
<body>

<div id="enter-screen" onclick="enterSite()">
  <h1>[ Click to Enter ]</h1>
</div>

<video loop id="bg-video" muted playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="card">
  <img class="pfp" src="pfp.png">  
  <div class="name">@YourName</div>
  <div class="bio">"insert your bio vibe here"</div>

  <a class="btn" href="https://discord.com" target="_blank">Discord</a>
  <a class="btn" href="https://instagram.com" target="_blank">Instagram</a>
  <a class="btn" href="https://youtube.com" target="_blank">YouTube</a>
</div>

<script>
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  // 1. Hide the splash entry screen
  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
  }, 800);

  // 2. Unmute and Play the video with its audio track simultaneously
  video.muted = false;
  video.volume = 0.5; // Sets volume to 50%
  video.play().catch(err => {
    console.log("Video failed to play. Ensure the user interacted with the page:", err);
  });
}
</script>

</body>
</html>
