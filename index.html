<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    color: white;
    background-color: #050103;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
  }

  /* Fullscreen Background Video & Overlay */
  #bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -2;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: brightness(0.35) contrast(1.1);
  }

  .bg-darkener {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(5,1,3,0.8) 100%);
    z-index: -1;
  }

  /* Canvas layer for custom snowflake particles */
  #particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Entry Splash Screen */
  #enter-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050103;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
  }

  #enter-screen h1 {
    font-size: 20px;
    letter-spacing: 5px;
    text-transform: lowercase;
    color: #ffffff;
    font-family: monospace;
    animation: blink 1.8s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Card Container */
  .card {
    width: 360px;
    max-width: 90vw;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 35px 25px 25px 25px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 10;
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
  }

  /* Discord Ring Inspired Frame */
  .pfp-container {
    margin-bottom: 15px;
    border-radius: 50%;
    border: 4px solid rgba(0, 255, 204, 0.2);
    box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .pfp-container:hover {
    transform: scale(1.03);
  }

  .pfp {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  /* Display Name */
  .name {
    font-weight: 600;
    font-size: 32px;
    color: #ffffff;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
  }

  /* Status Badge Element */
  .badge {
    background: rgba(0, 255, 204, 0.1);
    color: #00ffcc;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 15px;
    border: 1px solid rgba(0, 255, 204, 0.2);
  }

  /* Dynamic Bio Sub-captions */
  .sub-caption {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 6px;
    font-weight: 400;
  }

  .location {
    font-size: 13px;
    color: #00ffcc;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.8;
  }

  /* Enhanced Discord Nameplate */
  .discord-nameplate {
    background: rgba(7, 8, 14, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    width: 100%;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 25px;
    text-align: left;
    position: relative;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
  }

  .discord-avatar-wrapper {
    position: relative;
    display: flex;
  }

  .discord-mini-pfp {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* Status Indicator Dot with Pulse */
  .status-dot {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background-color: #23a55a;
    border: 2.5px solid #0a070d;
  }

  .status-dot::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-color: #23a55a;
    animation: status-pulse 2s infinite ease-in-out;
    z-index: -1;
    top: 0;
    left: 0;
  }

  @keyframes status-pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .discord-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .discord-header-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .discord-username {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
  }

  .discord-live-tag {
    font-size: 9px;
    background: rgba(35, 165, 90, 0.15);
    color: #23a55a;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .discord-status-text {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.75);
    font-weight: 400;
  }

  .discord-last-online {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 1px;
  }

  /* Social Links Grid */
  .social-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    width: 100%;
    flex-wrap: wrap;
  }

  .social-icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .social-icon svg {
    fill: #ffffff;
    opacity: 0.6;
    width: 100%;
    height: 100%;
    transition: opacity 0.2s ease, filter 0.2s ease, fill 0.2s ease;
  }

  .social-icon:hover {
    transform: scale(1.2);
  }

  .social-icon:hover svg {
    opacity: 1;
    fill: #00ffcc;
    filter: drop-shadow(0 0 6px rgba(0, 255, 204, 0.6));
  }

  /* View Counter System Design */
  .view-counter {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
  }

  .view-counter svg {
    fill: rgba(255, 255, 255, 0.4);
    width: 15px;
    height: 15px;
  }
</style>
</head>

<script>
function handleViews() {
  let views = localStorage.getItem('profile_view_count');
  if (!views) {
    views = Math.floor(Math.random() * (400 - 150 + 1)) + 150; 
  } else {
    views = parseInt(views) + 1;
  }
  localStorage.setItem('profile_view_count', views);
  document.getElementById('counts-display').innerText = views;
}
handleViews();

const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let particles = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height - canvas.height;
    this.size = Math.random() * 2.5 + 1;
    this.speedY = Math.random() * 1.2 + 0.4;
    this.speedX = Math.random() * 0.8 - 0.4;
    this.opacity = Math.random() * 0.4 + 0.2;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    if (this.y > canvas.height) {
      this.y = 0 - 10;
      this.x = Math.random() * canvas.width;
    }
  }
  draw() {
    ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 65; i++) {
    particles.push(new Particle());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}

function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
    initParticles();
    animateParticles();
  }, 600);

  video.muted = false;
  video.volume = 0.4;
  video.play().catch(err => {
    console.log("Autoplay prevented by system parameters.", err);
  });
}
</script>
