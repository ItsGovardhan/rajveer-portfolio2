<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
  color: white;
  background-color: #000;
}

/* Background video styling */
#bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.3) contrast(1.2);
}

/* Fallback gradient if video fails to load */
.bg-fallback {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(60,4,4,1) 0%, rgba(0,0,0,1) 100%);
  z-index: -2;
}

/* Entry screen styling */
#enter-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.8s ease, visibility 0.8s;
}

#enter-screen h1 {
  font-size: 24px;
  letter-spacing: 4px;
  text-transform: uppercase;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

/* Card layout */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 40px 30px;
  width: 360px;
  text-align: center;
  background: linear-gradient(135deg, rgba(74, 4, 38, 0.75) 0%, rgba(41, 2, 21, 0.9) 100%);
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
}

/* Discord Style PFP Decoration Container */
.pfp-container {
  display: inline-block;
  position: relative;
  margin-bottom: 25px;
  width: 140px;
  height: 140px;
}

.pfp {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 1;
}

/* Custom Zoro Swords Avatar Decoration */
.zoro-decoration {
  position: absolute;
  top: 0;
  left: 0;
  width: 140px;
  height: 140px;
  z-index: 2;
  pointer-events: none;
  filter: drop-shadow(0 2px 8px rgba(0, 255, 130, 0.4));
}

/* Glitch/distorted text appearance for username */
.name {
  font-family: 'Courier New', Courier, monospace;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 15px;
  color: #fff;
  text-shadow: 2px 2px 0px rgba(255, 0, 85, 0.5), -2px -2px 0px rgba(0, 200, 255, 0.5);
  position: relative;
}

/* Subtitle phrase */
.sub-caption {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 30px;
  color: rgba(255, 255, 255, 0.9);
}

/* Inline horizontal social row */
.social-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 25px;
}

.social-icon {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  filter: drop-shadow(0 0 8px rgba(255, 150, 190, 0.6));
}

.social-icon svg {
  fill: #ffb7d5;
  width: 100%;
  height: 100%;
}

.social-icon:hover {
  transform: scale(1.15);
  filter: drop-shadow(0 0 15px rgba(255, 100, 160, 0.9));
}

/* View Counter styling */
.view-counter {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.6);
  position: absolute;
  bottom: 20px;
  left: 25px;
}

.view-counter svg {
  fill: rgba(255, 255, 255, 0.6);
  width: 16px;
  height: 16px;
}
</style>
</head>
<body>

<div class="bg-fallback"></div>

<div id="enter-screen" onclick="enterSite()">
  <h1>[ Click to Enter ]</h1>

<video loop id="bg-video" muted playsinline>

    <span>3</span>

</div>

<script>
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
  }, 800);

  video.muted = false;
  video.volume = 0.4;
  video.play().catch(err => {
    console.log("Video initialization playback handled safely.", err);
  });
}
</script>

</body>
</html>
