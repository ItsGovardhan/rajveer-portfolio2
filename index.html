<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>itsme - Profile</title>
<style>
  :root {
    --bg-crimson: #310616;
    --neon-blue: #00f0ff;
    --neon-red: #ff0044;
    --lightning-glow: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    color: white;
    background-color: #050103;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  /* Background Video Styling */
  #bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -2;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: brightness(0.2) contrast(1.3);
  }

  .bg-fallback {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(50,4,12,1) 0%, rgba(5,0,2,1) 100%);
    z-index: -3;
  }

  /* Entry Splash Screen */
  #enter-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #080104;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.5s ease, visibility 0.5s;
  }

  #enter-screen h1 {
    font-size: 22px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--neon-blue);
    text-shadow: 0 0 10px var(--neon-blue);
    font-family: monospace;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Profile Box - Precisely matched proportions from 1000043419.jpg */
  .card {
    width: 345px;
    max-width: 90vw;
    background: linear-gradient(180deg, #380719 0%, #17020a 100%);
    border-radius: 32px;
    padding: 38px 25px 25px 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    border: 1px solid rgba(255, 0, 68, 0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Profile Frame Container with Brilliant White Neon Lightning Aura */
  .pfp-container {
    display: inline-block;
    position: relative;
    margin-bottom: 18px;
    border-radius: 50%;
    box-shadow: 0 0 20px 2px var(--lightning-glow),
                0 0 35px 6px rgba(0, 240, 255, 0.35),
                inset 0 0 10px rgba(0,0,0,0.8);
    animation: lightning-flicker 5s infinite linear;
  }

  @keyframes lightning-flicker {
    0%, 100%, 30%, 34%, 88%, 91% { opacity: 1; filter: drop-shadow(0 0 2px #fff); }
    32%, 89% { opacity: 0.88; filter: drop-shadow(0 0 0px #fff); }
    33% { opacity: 0.95; }
  }

  .pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #0f0105;
    display: block;
  }

  /* Aggressive Neon Glitch Username Style */
  .name {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 45px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #fff;
    text-transform: lowercase;
    margin-bottom: 14px;
    position: relative;
    display: inline-block;
    text-shadow: -2.5px -1.5px 0 var(--neon-blue), 2.5px 1.5px 0 var(--neon-red);
    animation: textGlitch 1.8s infinite steps(2);
  }

  @keyframes textGlitch {
    0%, 93% { text-shadow: -2.5px -1.5px 0 var(--neon-blue), 2.5px 1.5px 0 var(--neon-red); transform: skew(0deg); }
    94% { text-shadow: -4px 2px 0 var(--neon-red), 3px -2px 0 var(--neon-blue); transform: skew(3deg); }
    96% { text-shadow: 3.5px -3.5px 0 var(--neon-blue), -3px 3px 0 var(--neon-red); transform: skew(-4deg); }
    98% { text-shadow: -2.5px -1.5px 0 var(--neon-blue), 2.5px 1.5px 0 var(--neon-red); transform: skew(0deg); }
  }

  /* Sharp Glowing Tagline */
  .sub-caption {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 19px;
    letter-spacing: 0.5px;
    color: #ffffff;
    margin-bottom: 28px;
    opacity: 0.95;
    animation: red-blue-glow 3s infinite alternate;
  }

  @keyframes red-blue-glow {
    0% { text-shadow: 0 0 5px var(--neon-red); }
    100% { text-shadow: 0 0 8px var(--neon-blue), 0 0 12px rgba(255, 0, 68, 0.6); }
  }

  /* Social Dock Row matching screenshot layout */
  .social-row {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-bottom: 25px;
  }

  .social-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.15));
  }

  .social-icon svg {
    fill: #ffffff;
    opacity: 0.65;
    width: 100%;
    height: 100%;
    transition: fill 0.2s, opacity 0.2s, filter 0.2s;
  }

  .social-icon:hover {
    transform: scale(1.18);
  }

  .social-icon:hover svg {
    opacity: 1;
    fill: var(--neon-blue);
    filter: drop-shadow(0 0 8px var(--neon-blue));
  }

  /* View Counter at bottom-left corner */
  .view-counter {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
    position: absolute;
    bottom: 22px;
    left: 25px;
  }

  .view-counter svg {
    fill: rgba(255, 255, 255, 0.5);
    width: 15px;
    height: 15px;
  }

  .view-counter span {
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="bg-fallback"></div>

<div id="enter-screen" onclick="enterSite()">
  <h1>[ Click to Enter ]</h1>
</div>

<video loop id="bg-video" muted playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- Refined Profile Box Structure -->
<div class="card">
  
  <!-- Avatar framed inside White Lightning Aura -->
  <div class="pfp-container">
    <img class="pfp" src="pfp.png" alt="Profile Picture">  
  </div>

  <!-- Name & Tagline Identity Deck -->
  <div class="name">itsme</div>
  <div class="sub-caption">chill gng</div>

  <!-- Soft Glowing Social Navigation Dock -->

    <a class="social-icon" href="https://youtube.com" target="_blank" title="YouTube">

    <a class="social-icon" href="https://discord.com" target="_blank" title="Discord">
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.094 13.094 0 0 1-1.873-.894.077.077 0 0 1-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 0 1 .077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.009c.12.099.246.195.373.289a.077.077 0 0 1-.006.127 12.298 12.298 0 0 1-1.873.894.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.156 2.418z"/></svg>
    </a>
  </div>

  <!-- Bottom Corner View Metrics -->
  <div class="view-counter">
    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    <span>3</span>
  </div>

</div>

<script>
function enterSite() {
  const enterScreen = document.getElementById("enter-screen");
  const video = document.getElementById("bg-video");

  enterScreen.style.opacity = "0";
  setTimeout(() => {
    enterScreen.style.visibility = "hidden";
  }, 500);

  video.muted = false;
  video.volume = 0.4;
  video.play().catch(err => {
    console.log("Media element browser auto-play initialized.", err);
  });
}
</script>

</body>
</html>
